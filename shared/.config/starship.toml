format = """
╭─ $directory$git_branch$git_status$python$nodejs$rust$cmd_duration
╰─ $character
"""

scan_timeout = 10

[character]
success_symbol = "[❯❯](bold green)"
error_symbol = "[✗❯](bold red)"

[directory]
style = "bold yellow"
truncation_length = 3
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style)) '
style = "bold red"

[python]
symbol = "🐍 "
style = "bold blue"
format = '[${symbol}(\($virtualenv\) )]($style)'
pyenv_version_name = false

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json"]

[rust]
symbol = "🦀 "
style = "bold red"
format = "[$symbol($version )]($style)"

[cmd_duration]
min_time = 2_000
format = "⏱ [$duration]($style) "
style = "bold yellow"

[status]
disabled = false
format = "[$status ]($style)"
style = "bold red"

[time]
disabled = false
format = "🕯️ [$time] "

[line_break]
disabled = false
